name: QCA-ALL
on:
  workflow_run:
    workflows: ["Auto-Clean"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      PACKAGE:
        description: '手动调整插件包，多个请用\n符号隔开。'
        required: false
        type: string
      TEST:
        description: '仅输出配置文件，不编译固件。'
        default: 'false'
        required: false
        type: boolean
permissions: write-all
jobs:
  config:
    name: ${{matrix.CONFIG}}
    strategy:
      fail-fast: false
      matrix:
        CONFIG: [IPQ807X-WIFI-YES]
        SOURCE: [VIKINGYFY/immortalwrt]
        BRANCH: [main]
    uses: ./.github/workflows/WRT-CORE.yml
    with:
      WRT_CONFIG: ${{matrix.CONFIG}}
      WRT_THEME: bootstrap
      WRT_NAME: AP8220
      WRT_SSID: immortalwrt
      WRT_WORD: immortalwrt
      WRT_IP: 192.168.50.254
      WRT_PW: password
      WRT_REPO: https://github.com/${{matrix.SOURCE}}.git
      WRT_BRANCH: ${{matrix.BRANCH}}
      WRT_SOURCE: ${{matrix.SOURCE}}
      WRT_PACKAGE: |
        CONFIG_PACKAGE_luci-app-aurora-config=n
        CONFIG_PACKAGE_luci-theme-aurora=n
        CONFIG_PACKAGE_luci-app-autoreboot=n
        CONFIG_PACKAGE_luci-app-netspeedtest=n
        CONFIG_PACKAGE_luci-app-partexp=n
        CONFIG_PACKAGE_luci-app-samba4=n
        CONFIG_PACKAGE_luci-app-sqm=n
        CONFIG_PACKAGE_luci-app-tailscale=n
        CONFIG_PACKAGE_luci-app-wolplus=n
        CONFIG_PACKAGE_luci-app-gecoosac=n
        ${{inputs.PACKAGE}}
      WRT_TEST: ${{inputs.TEST}}
